<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Requests - Admin Dashboard</title>
    <link rel="icon" type="image/gif" href="artisanLogo.png">
    <link rel="stylesheet" href="/styles/sidebar.css">
    <script src="/js/include.js" defer></script>
    <style>
        /* ===== GLOBAL STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== BACKGROUND EFFECT ===== */
        .admin-bg {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100vh - 70px);
            z-index: -1;
            background: #000;
            background-image:
                radial-gradient(4px 100px at 0px 235px, rgb(161,255,20), #0000),
                radial-gradient(4px 100px at 300px 235px, rgb(161,255,20), #0000),
                radial-gradient(1.5px 1.5px at 150px 117.5px, rgb(161,255,20) 100%, #0000 150%);
            background-size: 300px 235px;
            animation: neonRain 120s linear infinite;
            pointer-events: none;
        }

        @keyframes neonRain {
            from { background-position: 0 0; }
            to { background-position: 0 6000px; }
        }

        /* ===== DASHBOARD LAYOUT ===== */
        .dashboard {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background-color: rgba(17, 24, 39, 1);
            border-right: 1px solid rgba(55, 65, 81, 1);
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .brand {
            text-align: center;
            font-size: 1.5rem;
            line-height: 2rem;
            font-weight: 700;
            color: rgb(161, 255, 20);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(55, 65, 81, 1);
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .menu-item {
            width: 100%;
        }

        .menu-btn, .menu-link {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background-color: transparent;
            border: 1px solid rgba(55, 65, 81, 1);
            border-radius: 0.375rem;
            color: white;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .menu-btn:hover, .menu-link:hover {
            background-color: rgba(161, 255, 20, 0.1);
            border-color: rgb(161, 255, 20);
            color: #ffffff;
        }

        .menu-item.active .menu-btn, .menu-item.active .menu-link {
            background-color: rgba(161, 255, 20, 0.15);
            border-color: rgb(161, 255, 20);
            color: rgb(161, 255, 20);
            font-weight: 600;
        }

        .menu-icon {
            width: 1.25rem;
            height: 1.25rem;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logout-item {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(55, 65, 81, 1);
        }

        .logout-link {
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.375rem;
            transition: all 0.3s ease;
        }

        .logout-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.5);
            color: #ffffff;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            padding: 1.75rem;
            background-color: rgba(0, 0, 0, 0.7);
        }

        /* ===== TOP BAR ===== */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(55, 65, 81, 1);
        }

        .topbar h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: rgb(161, 255, 20);
        }

        .admin-profile {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgb(161, 255, 20);
            padding: 2px;
        }

        .admin-profile img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* ===== STATS CARDS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: rgba(17, 24, 39, 1);
            border: 1px solid rgba(55, 65, 81, 1);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgb(161, 255, 20);
            box-shadow: 0 0 15px rgba(161, 255, 20, 0.2);
        }

        .stat-card h3 {
            font-size: 0.875rem;
            color: rgba(156, 163, 175, 1);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: rgb(161, 255, 20);
        }

        /* ===== ACTION BUTTONS ===== */
        .action-section {
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background-color: rgb(161, 255, 20);
            color: #000000;
        }

        .btn-primary:hover {
            background-color: rgba(161, 255, 20, 0.9);
            box-shadow: 0 0 15px rgba(161, 255, 20, 0.3);
        }

        .btn-secondary {
            background-color: rgba(55, 65, 81, 0.5);
            color: #ffffff;
            border: 1px solid rgba(161, 255, 20, 0.3);
        }

        .btn-secondary:hover {
            background-color: rgba(161, 255, 20, 0.1);
            border-color: rgb(161, 255, 20);
        }

        .btn-success {
            background-color: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .btn-success:hover {
            background-color: rgba(46, 204, 113, 0.3);
            border-color: #2ecc71;
        }

        .btn-danger {
            background-color: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .btn-danger:hover {
            background-color: rgba(231, 76, 60, 0.3);
            border-color: #e74c3c;
        }

        .search-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-input {
            background-color: rgba(17, 24, 39, 1);
            border: 1px solid rgba(55, 65, 81, 1);
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            color: #ffffff;
            font-size: 0.875rem;
            min-width: 250px;
        }

        .search-input:focus {
            outline: none;
            border-color: rgb(161, 255, 20);
        }

        /* ===== REQUESTS SECTIONS ===== */
        .requests-section {
            background-color: rgba(17, 24, 39, 1);
            border: 1px solid rgba(55, 65, 81, 1);
            border-radius: 0.75rem;
            padding: 1.75rem;
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.25rem;
            color: rgb(161, 255, 20);
            font-weight: 600;
        }

        /* ===== REQUEST CARDS ===== */
        .requests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .request-card {
            background-color: rgba(55, 65, 81, 0.1);
            border: 1px solid rgba(55, 65, 81, 0.5);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .request-card:hover {
            border-color: rgb(161, 255, 20);
            box-shadow: 0 0 15px rgba(161, 255, 20, 0.1);
        }

        .request-card.pending {
            border-left: 4px solid #ffc107;
        }

        .request-card.approved {
            border-left: 4px solid #2ecc71;
        }

        .request-card.rejected {
            border-left: 4px solid #e74c3c;
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .request-meta {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .request-id {
            font-size: 0.75rem;
            color: rgba(156, 163, 175, 1);
            font-weight: 500;
        }

        .request-name {
            font-size: 1.125rem;
            font-weight: 600;
            color: #ffffff;
        }

        .request-email {
            font-size: 0.875rem;
            color: rgba(161, 255, 20);
        }

        .request-date {
            font-size: 0.75rem;
            color: rgba(156, 163, 175, 1);
        }

        .request-status {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background-color: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }

        .status-approved {
            background-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }

        .status-rejected {
            background-color: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }

        .request-details {
            margin: 1rem 0;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 0.5rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .detail-label {
            color: rgba(156, 163, 175, 1);
        }

        .detail-value {
            color: #ffffff;
            font-weight: 500;
        }

        .request-message {
            margin-top: 1rem;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 0.5rem;
            border-left: 3px solid rgba(161, 255, 20, 0.5);
        }

        .message-label {
            font-size: 0.75rem;
            color: rgba(156, 163, 175, 1);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-content {
            font-size: 0.875rem;
            color: #ffffff;
            line-height: 1.5;
        }

        .request-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(55, 65, 81, 0.3);
        }

        /* ===== ACTION BUTTONS ===== */
        .action-btn {
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.25rem;
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-btn:hover {
            border-color: rgb(161, 255, 20);
            color: rgb(161, 255, 20);
        }

        .action-btn.approve {
            background-color: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border-color: rgba(46, 204, 113, 0.3);
        }

        .action-btn.approve:hover {
            background-color: rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
        }

        .action-btn.reject {
            background-color: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border-color: rgba(231, 76, 60, 0.3);
        }

        .action-btn.reject:hover {
            background-color: rgba(231, 76, 60, 0.2);
            border-color: #e74c3c;
        }

        .action-btn.view {
            background-color: rgba(52, 152, 219, 0.1);
            color: #3498db;
            border-color: rgba(52, 152, 219, 0.3);
        }

        .action-btn.view:hover {
            background-color: rgba(52, 152, 219, 0.2);
            border-color: #3498db;
        }

        /* ===== FILTER TABS ===== */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(55, 65, 81, 0.5);
            padding-bottom: 1rem;
        }

        .filter-tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(55, 65, 81, 0.5);
            border-radius: 0.375rem;
            color: rgba(156, 163, 175, 1);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tab:hover {
            background-color: rgba(161, 255, 20, 0.05);
            color: #ffffff;
        }

        .filter-tab.active {
            background-color: rgba(161, 255, 20, 0.15);
            border-color: rgb(161, 255, 20);
            color: rgb(161, 255, 20);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(156, 163, 175, 1);
        }

        .empty-icon {
            width: 4rem;
            height: 4rem;
            margin: 0 auto 1rem;
            stroke: rgba(156, 163, 175, 0.5);
            fill: none;
            stroke-width: 1.5;
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 1024px) {
            .dashboard {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(55, 65, 81, 1);
            }
            
            .sidebar-menu {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .menu-btn, .menu-link {
                min-width: 140px;
            }
            
            .action-section {
                flex-direction: column;
                align-items: stretch;
            }
            
            .action-buttons {
                justify-content: center;
            }
            
            .search-container {
                width: 100%;
            }
            
            .search-input {
                min-width: unset;
                flex: 1;
            }
            
            .requests-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .section-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }
            
            .request-header {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .request-actions {
                flex-direction: column;
            }
            
            .filter-tabs {
                flex-wrap: wrap;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="/js/include.js" defer></script>
</head>
<body>
    <!-- Background Effect -->
    <div class="admin-bg"></div>

    <div class="dashboard">
        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <h1>Registration Requests</h1>
                <div class="admin-profile">
                    <img src="profile_icon.png" alt="Admin Profile">
                </div>
            </header>

            <!-- Stats Overview -->
            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Pending Requests</h3>
                    <p class="stat-number">12</p>
                </div>
                <div class="stat-card">
                    <h3>Approved This Week</h3>
                    <p class="stat-number">8</p>
                </div>
                <div class="stat-card">
                    <h3>Rejected This Week</h3>
                    <p class="stat-number">3</p>
                </div>
                <div class="stat-card">
                    <h3>Avg. Response Time</h3>
                    <p class="stat-number">6h</p>
                </div>
            </section>

            <!-- Action Buttons -->
            <section class="action-section">
                <div class="action-buttons">
                    <button class="btn btn-primary">
                        <svg class="menu-icon" viewBox="0 0 24 24">
                            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                        </svg>
                        Refresh All
                    </button>
                    <button class="btn btn-success">
                        <svg class="menu-icon" viewBox="0 0 24 24">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                        Approve All Pending
                    </button>
                    <button class="btn btn-secondary">
                        <svg class="menu-icon" viewBox="0 0 24 24">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Export Requests
                    </button>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search requests by name, email, or ID...">
                    <button class="btn btn-secondary">
                        <svg class="menu-icon" viewBox="0 0 24 24">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        Search
                    </button>
                </div>
            </section>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active">All Requests (25)</button>
                <button class="filter-tab">Pending (12)</button>
                <button class="filter-tab">Approved (10)</button>
                <button class="filter-tab">Rejected (3)</button>
            </div>


            </section>

            <!-- No Requests Empty State -->
            <section class="requests-section" style="display: none;">
                <div class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24">
                        <path d="M14,10V22H4a2,2,0,0,1-2-2V10Z"></path>
                        <path d="M22,10V20a2,2,0,0,1-2,2H16V10Z"></path>
                        <path d="M22,4V8H2V4A2,2,0,0,1,4,2H20A2,2,0,0,1,22,4Z"></path>
                    </svg>
                    <h3>No Pending Requests</h3>
                    <p>All registration requests have been processed. Check back later for new requests.</p>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
