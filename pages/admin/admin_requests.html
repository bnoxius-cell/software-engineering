<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Requests - Admin Dashboard</title>
    <link rel="icon" type="image/gif" href="artisanLogo.png">
    <link rel="stylesheet" href="/styles/sidebar.css">
    <link rel="stylesheet" href="/styles/pages/admin/requests.css">
    <link rel="stylesheet" href="/styles/pages/admin/main.css">
    <script src="/js/include.js" defer></script>
</head>
<body>
    <!-- Background Effect -->
    <div class="admin-bg"></div>

    <div class="dashboard">
        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <h1>Registration Requests</h1>
                <div class="admin-profile">
                    <img src="/assets/images/profile_icon.png" alt="Admin Profile">
                </div>
            </header>

            <!-- Stats Overview -->
            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Pending Requests</h3>
                    <p class="stat-number">12</p>
                </div>
                <div class="stat-card">
                    <h3>Approved This Week</h3>
                    <p class="stat-number">8</p>
                </div>
                <div class="stat-card">
                    <h3>Rejected This Week</h3>
                    <p class="stat-number">3</p>
                </div>
                <div class="stat-card">
                    <h3>Avg. Response Time</h3>
                    <p class="stat-number">6h</p>
                </div>
            </section>

            <!-- Action Buttons -->
            <section class="action-section">
                <div class="action-buttons">
                    <button class="btn btn-primary">
                        <svg class="menu-icon" viewBox="0 0 24 24">
                            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                        </svg>
                        Refresh All
                    </button>
                    <button class="btn btn-success">
                        <svg class="menu-icon" viewBox="0 0 24 24">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                        Approve All Pending
                    </button>
                    <button class="btn btn-secondary">
                        <svg class="menu-icon" viewBox="0 0 24 24">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Export Requests
                    </button>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search requests by name, email, or ID...">
                    <button class="btn btn-secondary">
                        <svg class="menu-icon" viewBox="0 0 24 24">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        Search
                    </button>
                </div>
            </section>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active">All Requests (25)</button>
                <button class="filter-tab">Pending (12)</button>
                <button class="filter-tab">Approved (10)</button>
                <button class="filter-tab">Rejected (3)</button>
            </div>


            </section>

            <!-- No Requests Empty State -->
            <section class="requests-section" style="display: none;">
                <div class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24">
                        <path d="M14,10V22H4a2,2,0,0,1-2-2V10Z"></path>
                        <path d="M22,10V20a2,2,0,0,1-2,2H16V10Z"></path>
                        <path d="M22,4V8H2V4A2,2,0,0,1,4,2H20A2,2,0,0,1,22,4Z"></path>
                    </svg>
                    <h3>No Pending Requests</h3>
                    <p>All registration requests have been processed. Check back later for new requests.</p>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
