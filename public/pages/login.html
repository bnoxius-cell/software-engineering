<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMC Artisan E-Portfolio</title>
    <link rel="icon" type="image/gif" href= "artisanLogo.png">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/pages/login.css">
    <script src="/js/include.js" defer></script>
</head>
<body>
    <div id="header"></div>
    <!-- for background effect-->
    <div class="login-bg"></div>
    <div class="form-container">
        <p class="title">Login</p>
        <form class="form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="">
                <div class="forgot"><a rel="noopener noreferrer" href="#">Forgot Password?</a></div>
            </div>
            <button class="sign">Sign in</button>
        </form>
        <div class="social-message">
            <div class="line"></div>
            <p class="message">Login with social accounts</p>
            <div class="line"></div>
        </div>
        <!-- TODO: Make alternate icons for mouse hover -->
        <div class="social-icons">
            <a aria-label="Log in with Google" class="icon"><img src="/assets/images/icons/google.png" alt="Google Sign-in"></a>
            <a aria-label="Log in with Twitter" class="icon"><img src="/assets/images/icons/twitter.png" alt="Twitter Sign-in"></a>
            <a aria-label="Log in with GitHub" class="icon"><img src="/assets/images/icons/github.png" alt="GitHub Sign-in"></a>
        </div>
        <!-- TODO: No sign-up option since it is handled by the admin -->
        <p class="signup"><del>Don't have an account? <a rel="noopener noreferrer" href="admin_dashboard.html" class="">Sign up</del></a></p>
    </div>
</body>
</html>
