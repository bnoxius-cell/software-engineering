<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMC Artisan E-Portfolio</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/index.css">
    <link rel="icon" type="image/gif" href= "/assets/images/artisanLogo.png">
    <script src="/js/index.js" defer></script>
    <script src="/js/include.js" defer></script>
</head>
<body>
    <div id="header"></div>
    
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-box">
            <div class="hero-text">
                <h1>Welcome to EMC Artisan E-Portfolio</h1>
                <p>Explore the artistic creations of EMC students.</p>
                <!-- Gallery Preview -->             
                <a href="gallery.html" class="button-link">
                    <button class="button">
                        <svg class="svgIcon" viewBox="0 0 512 512" height="1em" xmlns="http://www.w3.org/2000/svg">
                            <path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm50.7-186.9L162.4 380.6c-19.4 7.5-38.5-11.6-31-31l55.5-144.3c3.3-8.5 9.9-15.1 18.4-18.4l144.3-55.5c19.4-7.5 38.5 11.6 31 31L325.1 306.7c-3.2 8.5-9.9 15.1-18.4 18.4zM288 256a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z"></path>
                        </svg>
                        Explore
                    </button>
                </a>
            </div>
            <div class="hero-image">
                <img src="/assets/images/homeBackgroundImg.png" alt="Featured Art">
            </div>
        </div>
    </section>

    <!-- Gallery Preview -->
    <section class="gallery-preview" style="background-color: #555555; padding: 40px 0;">
        <h2 style="text-align:center; color:white; margin-bottom: 30px;">Recent Works</h2>
        <div class="artwork-grid" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;">

            <!-- TODO: Hardcoded images; fix later -->
            <div class="card">
                <img src="sampleArt_1.jpg" alt="Artwork 1" class="card__image">
                <div class="card__content">
                    <p class="card__title">Artwork 1</p>
                    <p class="card__description">Description for Artwork 1 the goes here.</p>
                    <a href="gallery.html" class="card__button-link"><button class="card__button">See more</button></a>
                    <button class="card__button secondary">Share</button>
                </div>
            </div>
            <div class="card">
                <img src="sampleArt_2.jpg" alt="Artwork 2" class="card__image">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 5H4V19L13.2923 9.70649C13.6828 9.31595 14.3159 9.31591 14.7065 9.70641L20 15.0104V5ZM2 3.9934C2 3.44476 2.45531 3 2.9918 3H21.0082C21.556 3 22 3.44495 22 3.9934V20.0066C22 20.5552 21.5447 21 21.0082 21H2.9918C2.44405 21 2 20.5551 2 20.0066V3.9934ZM8 11C6.89543 11 6 10.1046 6 9C6 7.89543 6.89543 7 8 7C9.10457 7 10 7.89543 10 9C10 10.1046 9.10457 11 8 11Z"></path>
                </svg>
                <div class="card__content">
                    <p class="card__title">Artwork 2</p>
                    <p class="card__description">Description for Artwork 2 goes here.</p>
                    <a href="gallery.html" class="card__button-link"><button class="card__button">See more</button></a>
                    <button class="card__button secondary">Share</button>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>
</body>
</html>
